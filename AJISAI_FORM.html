
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJISAI　生成</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background-color: #0d0f12;
      color: #e0e0e0;
      font-family: 'Shippori Mincho', serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: #0d0f12;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .title-logo {
      font-size: 3rem;
      font-weight: bold;
      color: #00ff66;
      letter-spacing: 0.3em;
      text-shadow: 0 0 10px #00ff66, 0 0 20px #00ff66, 0 0 40px #00ff66;
      opacity: 0;
      transform: scale(0.8);
      animation: titleAnim 2.5s ease-out forwards;
    }

    @keyframes titleAnim {
      0% {
        opacity: 0;
        transform: scale(0.8);
        filter: blur(10px);
      }
      50% {
        opacity: 1;
        filter: blur(0px);
      }
      80% {
        opacity: 1;
        transform: scale(1.05);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    #splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .app-container.visible {
      opacity: 1;
    }

    h1 {
      color: #00ff66;
      font-size: 1.5rem;
      text-align: center;
      text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
      word-break: break-word;
    }

    .form-card {
      width: 100%;
      background: #16191f;
      border: 1px solid #00ff66;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-size: 0.9rem;
      color: #00ff66;
      font-weight: bold;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 10px;
      background: #0d0f12;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-family: 'Shippori Mincho', serif;
      font-size: 0.95rem;
      margin-top: 5px;
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #00ff66;
      box-shadow: 0 0 8px rgba(0, 255, 102, 0.4);
    }

    .allergy-section {
      margin-top: 5px;
    }

    .allergy-title {
      font-size: 0.85rem;
      color: #aaa;
      margin: 8px 0 4px 0;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: #ccc;
      cursor: pointer;
    }

    .checkbox-label input {
      accent-color: #00ff66;
      cursor: pointer;
    }

    .neon-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #00ff66;
      border: 2px solid #00ff66;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      font-family: 'Shippori Mincho', serif;
      cursor: pointer;
      text-shadow: 0 0 5px #00ff66;
      box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
      transition: all 0.2s ease;
      margin-top: 10px;
    }

    .neon-btn:hover {
      background: #00ff66;
      color: #0d0f12;
      box-shadow: 0 0 20px rgba(0, 255, 102, 0.8);
    }

    .close-btn {
      border-color: #ff3366;
      color: #ff3366;
      text-shadow: 0 0 5px #ff3366;
      box-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
    }

    .close-btn:hover {
      background: #ff3366;
      color: #ffffff;
      box-shadow: 0 0 20px rgba(255, 51, 102, 0.8);
    }

    .result-card {
      width: 100%;
      background: #16191f;
      border: 1px solid #00ff66;
      border-radius: 12px;
      padding: 20px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
    }

    .result-card.active {
      display: flex;
    }

    .qr-frame {
      background: #ffffff;
      padding: 15px;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .qr-frame img {
      display: block;
      width: 200px;
      height: 200px;
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="title-logo">AJISAI</div>
  </div>

  <div id="app-container" class="app-container">
    <h1>AJISAI　生成</h1>

    <div id="form-card" class="form-card">
      <div>
        <label for="food-name">食品名 *</label>
        <input type="text" id="food-name" placeholder="例: マグロ缶詰" required>
      </div>

      <div>
        <label for="ingredients">原材料</label>
        <textarea id="ingredients" rows="2" placeholder="例: まぐろ、大豆油、食塩"></textarea>
      </div>

      <div class="allergy-section">
        <label>アレルギー品目（28品目）</label>
        
        <div class="allergy-title">■ 特定原材料（8品目・義務）</div>
        <div class="checkbox-grid" id="mandatory-allergies"></div>

        <div class="allergy-title">■ 特定原材料に準ずるもの（20品目・推奨）</div>
        <div class="checkbox-grid" id="recommended-allergies"></div>
      </div>

      <div>
        <label for="storage">保存方法</label>
        <input type="text" id="storage" placeholder="例: 直射日光を避け、常温で保存">
      </div>

      <button class="neon-btn" onclick="generateQRCode()">QRコードを生成する</button>
    </div>

    <div id="result-card" class="result-card">
      <h2 style="color: #00ff66; font-size: 1.1rem;">生成完了</h2>
      
      <div class="qr-frame">
        <img id="qr-img" src="" alt="QR Code">
      </div>

      <button class="neon-btn" onclick="downloadQR()">QRコードを保存</button>
      <button class="neon-btn close-btn" onclick="resetUI()">閉じる</button>
    </div>
  </div>

  <script>
    const mandatoryList = ["えび", "かに", "くるみ", "小麦", "そば", "卵", "乳", "落花生（ピーナッツ）"];
    const recommendedList = [
      "アーモンド", "あわび", "いか", "いくら", "オレンジ", "カシューナッツ", 
      "キウイフルーツ", "牛肉", "ごま", "さけ", "さば", "大豆", "鶏肉", 
      "豚肉", "まつたけ", "もも", "やまいも", "りんご", "ゼラチン", "バナナ"
    ];

    window.addEventListener('DOMContentLoaded', () => {
      const splashScreen = document.getElementById('splash-screen');
      const appContainer = document.getElementById('app-container');

      initAllergyCheckboxes();

      setTimeout(() => {
        splashScreen.classList.add('fade-out');
        appContainer.classList.add('visible');
      }, 2500);
    });

    function initAllergyCheckboxes() {
      const mandContainer = document.getElementById('mandatory-allergies');
      mandatoryList.forEach(item => {
        mandContainer.innerHTML += `
          <label class="checkbox-label">
            <input type="checkbox" value="${item}" class="allergy-check"> ${item}
          </label>
        `;
      });

      const recContainer = document.getElementById('recommended-allergies');
      recommendedList.forEach(item => {
        recContainer.innerHTML += `
          <label class="checkbox-label">
            <input type="checkbox" value="${item}" class="allergy-check"> ${item}
          </label>
        `;
      });
    }

    function generateQRCode() {
      const name = document.getElementById('food-name').value.trim();
      const ingredients = document.getElementById('ingredients').value.trim();
      const storage = document.getElementById('storage').value.trim();

      if (!name) {
        alert('食品名を入力してください。');
        return;
      }

      const selectedAllergies = [];
      document.querySelectorAll('.allergy-check:checked').forEach(cb => {
        selectedAllergies.push(cb.value);
      });

      const foodData = {
        n: name,
        i: ingredients,
        a: selectedAllergies,
        s: storage
      };

      const jsonData = JSON.stringify(foodData);
      const encodedData = encodeURIComponent(jsonData);
      
      const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodedData}`;

      const qrImg = document.getElementById('qr-img');
      qrImg.src = qrApiUrl;

      document.getElementById('form-card').style.display = 'none';
      document.getElementById('result-card').classList.add('active');
    }

    function downloadQR() {
      const qrImg = document.getElementById('qr-img');
      if (!qrImg.src) return;

      fetch(qrImg.src)
        .then(response => response.blob())
        .then(blob => {
          const blobUrl = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = 'food_info_qr.png';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(blobUrl);
        })
        .catch(() => alert('画像のダウンロードに失敗しました。'));
    }

    function resetUI() {
      document.getElementById('result-card').classList.remove('active');
      document.getElementById('form-card').style.display = 'flex';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
